name: Every Three Hours Task

on:
  schedule:
    # This triggers the workflow every 3 hours (at minute 0)
    - cron: '*/3 * * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  periodic-task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run a script
        run: echo "The three-hour timer has popped!"
